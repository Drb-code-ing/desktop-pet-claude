<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #particles {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    .particle {
      position: absolute;
      font-size: 14px;
      pointer-events: none;
      transition: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="particles"></div>
  <script src="renderer.js"></script>
</body>
</html>
